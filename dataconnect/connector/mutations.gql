mutation UpsertUser(
  $username: String!
  $email: String!
  $passwordHash: String!
  $displayName: String
  $plan: String!
  $role: String!
) @auth(level: USER) {
  user_upsert(data: {
    id_expr: "auth.uid"
    username: $username
    email: $email
    passwordHash: $passwordHash
    displayName: $displayName
    plan: $plan
    role: $role
    createdAt_expr: "request.time"
    updatedAt_expr: "request.time"
    lastLogin_expr: "request.time"
  })
}

mutation CreateProject(
  $name: String!
  $description: String
  $domain: String
  $repositoryUrl: String
  $techStack: [String!]
) @auth(level: USER) {
  project_insert(data: {
    userId_expr: "auth.uid"
    name: $name
    description: $description
    domain: $domain
    repositoryUrl: $repositoryUrl
    techStack: $techStack
    createdAt_expr: "request.time"
    updatedAt_expr: "request.time"
  })
}

mutation UpdateProject(
  $id: UUID!
  $name: String
  $description: String
  $domain: String
  $repositoryUrl: String
  $techStack: [String!]
) @auth(level: USER) {
  project_updateMany(
    where: {
      _and: [
        { id: { eq: $id } }
        { userId: { eq_expr: "auth.uid" } }
      ]
    }
    data: {
      name: $name
      description: $description
      domain: $domain
      repositoryUrl: $repositoryUrl
      techStack: $techStack
      updatedAt_expr: "request.time"
    }
  )
}

mutation DeleteProject($id: UUID!) @auth(level: USER) {
  project_deleteMany(
    where: {
      _and: [
        { id: { eq: $id } }
        { userId: { eq_expr: "auth.uid" } }
      ]
    }
  )
}

mutation CreateCodeRequest(
  $projectId: UUID
  $rawRequest: String!
  $urgency: String
  $areaOfApp: String
) @auth(level: USER) {
  codeRequest_insert(data: {
    userId_expr: "auth.uid"
    projectId: $projectId
    rawRequest: $rawRequest
    urgency: $urgency
    areaOfApp: $areaOfApp
    status: "pending"
    createdAt_expr: "request.time"
    updatedAt_expr: "request.time"
  })
}

mutation UpdateCodeRequestStatus($id: UUID!, $status: String!) @auth(level: USER) {
  codeRequest_updateMany(
    where: {
      _and: [
        { id: { eq: $id } }
        { userId: { eq_expr: "auth.uid" } }
      ]
    }
    data: {
      status: $status
      updatedAt_expr: "request.time"
    }
  )
}

mutation CreateKnowledgeBase(
