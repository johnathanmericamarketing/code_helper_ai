  $title: String!
  $category: String!
  $description: String!
  $priority: Int!
  $language: String
  $framework: String
  $codeExample: String
  $badExample: String
) @auth(level: USER) {
  knowledgeBase_insert(data: {
    userId_expr: "auth.uid"
    projectId: $projectId
    title: $title
    category: $category
    description: $description
    priority: $priority
    language: $language
    framework: $framework
    codeExample: $codeExample
    badExample: $badExample
    createdAt_expr: "request.time"
    updatedAt_expr: "request.time"
  })
}

mutation DeleteKnowledgeBase($id: UUID!) @auth(level: USER) {
  knowledgeBase_deleteMany(
    where: {
      _and: [
        { id: { eq: $id } }
        { userId: { eq_expr: "auth.uid" } }
      ]
    }
  )
}

mutation CreateWorkspace(
  $name: String!
  $path: String!
  $description: String
  $isGitRepo: Boolean!
) @auth(level: USER) {
  workspace_insert(data: {
    userId_expr: "auth.uid"
    name: $name
    path: $path
    description: $description
    isGitRepo: $isGitRepo
    createdAt_expr: "request.time"
  })
}

mutation DeleteWorkspace($id: UUID!) @auth(level: USER) {
  workspace_deleteMany(
    where: {
      _and: [
        { id: { eq: $id } }
        { userId: { eq_expr: "auth.uid" } }
      ]
    }
  )
}
